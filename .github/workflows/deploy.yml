name: Deploy to parityrfp.com

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: FTP Deploy to /cs/alex-movie-theater/
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate database.php from secrets
        id: gen_db
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import os, sys

          def esc(v):
              return v.replace('\\', '\\\\').replace("'", "\\'")

          host = esc(os.environ.get('DB_HOST', ''))
          db   = esc(os.environ.get('DB_NAME', ''))
          user = esc(os.environ.get('DB_USER', ''))
          pwd  = esc(os.environ.get('DB_PASS', ''))

          if not host:
              sys.stdout.write("WARNING: DB secrets not configured — skipping database.php generation.\n")
              sys.stdout.write("Server will keep its existing database.php unchanged.\n")
              sys.stdout.write("Fix: set DB_HOST, DB_NAME, DB_USER, DB_PASSWORD in repo secrets.\n")
              # Write sentinel so the upload step knows to skip
              with open('./config/.skip_db_upload', 'w') as f:
                  f.write('1')
          else:
              php = (
                  "<?php\n"
                  "declare(strict_types=1);\n"
                  "return [\n"
                  "    'host'     => '" + host + "',\n"
                  "    'database' => '" + db   + "',\n"
                  "    'username' => '" + user + "',\n"
                  "    'password' => '" + pwd  + "',\n"
                  "    'charset'  => 'utf8mb4',\n"
                  "];\n"
              )
              with open('./config/database.php', 'w') as f:
                  f.write(php)
              sys.stdout.write("Generated config/database.php from secrets\n")
          PYEOF

      - name: Deploy public/ to web root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./public/
          server-dir: /cs/alex-movie-theater/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db
            **/.htaccess.bak
            **/config/database.php

      - name: Deploy includes/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./includes/
          server-dir: /cs/alex-movie-theater/includes/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db

      - name: Deploy templates/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./templates/
          server-dir: /cs/alex-movie-theater/templates/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db

      - name: Deploy config/ (excluding database.php)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./config/
          server-dir: /cs/alex-movie-theater/config/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db
            **/database.php
            **/.skip_db_upload

      - name: Deploy database/ (excluding seed.sql)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./database/
          server-dir: /cs/alex-movie-theater/database/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db
            **/seed.sql

      - name: Deploy database.php via FTP
        run: |
          if [ -f "./config/.skip_db_upload" ]; then
            echo "Skipping database.php upload — DB secrets not configured."
            echo "Server retains its existing database.php."
          else
            curl -s --ftp-create-dirs \
              -T "./config/database.php" \
              -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
              "ftp://${{ secrets.FTP_HOST }}/cs/alex-movie-theater/config/database.php"
            echo "Uploaded database.php"
          fi

      - name: Run DB init and cleanup
        run: |
          curl -s --ftp-create-dirs \
            -T "./scripts/db-init.php" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_HOST }}/cs/alex-movie-theater/db-init.php"
          echo "Uploaded db-init.php — running..."
          curl -s --max-time 30 \
            "https://parityrfp.com/cs/alex-movie-theater/db-init.php" \
            -o /tmp/db-result.json
          echo "DB init result:"
          cat /tmp/db-result.json
          curl -s \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /cs/alex-movie-theater/db-init.php" \
            "ftp://${{ secrets.FTP_HOST }}"
          echo "Removed db-init.php from server"

      - name: Run DB migration
        run: |
          curl -s --ftp-create-dirs \
            -T "./scripts/db-migrate.php" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_HOST }}/cs/alex-movie-theater/db-migrate.php"
          echo "Uploaded db-migrate.php — running..."
          curl -s --max-time 60 \
            "https://parityrfp.com/cs/alex-movie-theater/db-migrate.php" \
            -o /tmp/migrate-result.json
          echo "DB migration result:"
          cat /tmp/migrate-result.json
          curl -s \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /cs/alex-movie-theater/db-migrate.php" \
            "ftp://${{ secrets.FTP_HOST }}"
          echo "Removed db-migrate.php from server"

      - name: Deployment summary
        run: |
          echo "Deploy complete: https://parityrfp.com/cs/alex-movie-theater/"
