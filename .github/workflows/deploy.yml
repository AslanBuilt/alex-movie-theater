name: Deploy to parityrfp.com

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: FTP Deploy to /cs/alex-movie-theater/
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint PHP (syntax gate — aborts deploy before any upload)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq php-cli
          php -v
          echo "Linting PHP files in public/ and scripts/ ..."
          find ./public ./scripts -name '*.php' -print0 | xargs -0 -n1 -P4 php -l
          echo "All PHP files passed php -l"

      - name: Generate database.php from secrets
        id: gen_db
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASSWORD }}
        run: |
          python3 - << 'PYEOF'
          import os, sys

          def esc(v):
              return v.replace('\\', '\\\\').replace("'", "\\'")

          host = esc(os.environ.get('DB_HOST', ''))
          db   = esc(os.environ.get('DB_NAME', ''))
          user = esc(os.environ.get('DB_USER', ''))
          pwd  = esc(os.environ.get('DB_PASS', ''))

          if not host:
              sys.stdout.write("WARNING: DB secrets not configured — skipping database.php generation.\n")
              sys.stdout.write("Server will keep its existing database.php unchanged.\n")
              sys.stdout.write("Fix: set DB_HOST, DB_NAME, DB_USER, DB_PASSWORD in repo secrets.\n")
              with open('/tmp/.skip_db_upload', 'w') as f:
                  f.write('1')
          else:
              php = (
                  "<?php\n"
                  "declare(strict_types=1);\n"
                  "return [\n"
                  "    'host'     => '" + host + "',\n"
                  "    'database' => '" + db   + "',\n"
                  "    'username' => '" + user + "',\n"
                  "    'password' => '" + pwd  + "',\n"
                  "    'charset'  => 'utf8mb4',\n"
                  "];\n"
              )
              with open('./public/config/database.php', 'w') as f:
                  f.write(php)
              sys.stdout.write("Generated public/config/database.php from secrets\n")
          PYEOF

      - name: Generate stripe.php from secrets
        id: gen_stripe
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_MODE: ${{ secrets.STRIPE_MODE }}
        run: |
          python3 - << 'PYEOF'
          import os, sys

          def esc(v):
              return v.replace('\\', '\\\\').replace("'", "\\'")

          sk   = esc(os.environ.get('STRIPE_SECRET_KEY', ''))
          pk   = esc(os.environ.get('STRIPE_PUBLISHABLE_KEY', ''))
          wh   = esc(os.environ.get('STRIPE_WEBHOOK_SECRET', ''))
          mode = esc(os.environ.get('STRIPE_MODE', '') or 'test')

          if not sk:
              sys.stdout.write("WARNING: STRIPE_SECRET_KEY not set — skipping stripe.php generation.\n")
              sys.stdout.write("Server keeps its existing stripe.php (Stripe checkout will error until set).\n")
              sys.stdout.write("Fix: set STRIPE_SECRET_KEY, STRIPE_PUBLISHABLE_KEY, STRIPE_WEBHOOK_SECRET in repo secrets.\n")
              with open('/tmp/.skip_stripe_upload', 'w') as f:
                  f.write('1')
          else:
              php = (
                  "<?php\n"
                  "declare(strict_types=1);\n"
                  "return [\n"
                  "    'secret_key'      => '" + sk + "',\n"
                  "    'publishable_key' => '" + pk + "',\n"
                  "    'webhook_secret'  => '" + wh + "',\n"
                  "    'currency'        => 'usd',\n"
                  "    'mode'            => '" + mode + "',\n"
                  "];\n"
              )
              with open('./public/config/stripe.php', 'w') as f:
                  f.write(php)
              sys.stdout.write("Generated public/config/stripe.php from secrets (mode=" + mode + ")\n")
          PYEOF

      - name: Clear FTP deploy cache (force full re-upload)
        run: |
          curl -s \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /cs/alex-movie-theater/.ftp-deploy-sync-state.json" \
            "ftp://${{ secrets.FTP_HOST }}" || true

      - name: Deploy public/ to web root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./public/
          server-dir: /cs/alex-movie-theater/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db
            **/.htaccess.bak
            **/config/database.php
            **/config/stripe.php

      - name: Remove retired server files (deletions don't propagate via FTP sync)
        # The "Clear FTP deploy cache" step wipes the sync-state each run, so the
        # FTP action re-uploads everything but never deletes files removed from
        # the repo. Explicitly DELE anything retired so it can't linger live.
        # `|| true` keeps this idempotent once the file is already gone.
        run: |
          for f in pos-doctor.php; do
            curl -s \
              -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
              -Q "DELE /cs/alex-movie-theater/$f" \
              "ftp://${{ secrets.FTP_HOST }}" || true
            echo "Ensured removed: $f"
          done

      - name: Deploy database/ (excluding seed.sql)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./database/
          server-dir: /cs/alex-movie-theater/database/
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            **/Thumbs.db
            **/seed.sql

      - name: Deploy database.php via FTP
        run: |
          if [ -f "/tmp/.skip_db_upload" ]; then
            echo "Skipping database.php upload — DB secrets not configured."
            echo "Server retains its existing database.php."
          else
            curl -s --ftp-create-dirs \
              -T "./public/config/database.php" \
              -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
              "ftp://${{ secrets.FTP_HOST }}/cs/alex-movie-theater/config/database.php"
            echo "Uploaded database.php"
          fi

      - name: Deploy stripe.php via FTP
        run: |
          if [ -f "/tmp/.skip_stripe_upload" ]; then
            echo "Skipping stripe.php upload — STRIPE_SECRET_KEY not configured."
            echo "Server retains its existing stripe.php (if any)."
          else
            curl -s --ftp-create-dirs \
              -T "./public/config/stripe.php" \
              -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
              "ftp://${{ secrets.FTP_HOST }}/cs/alex-movie-theater/config/stripe.php"
            echo "Uploaded stripe.php"
          fi

      - name: Run DB init and cleanup
        run: |
          curl -s --ftp-create-dirs \
            -T "./scripts/db-init.php" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_HOST }}/cs/alex-movie-theater/db-init.php"
          echo "Uploaded db-init.php — running..."
          curl -s --max-time 30 \
            "https://parityrfp.com/cs/alex-movie-theater/db-init.php" \
            -o /tmp/db-result.json
          echo "DB init result:"
          cat /tmp/db-result.json
          curl -s \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /cs/alex-movie-theater/db-init.php" \
            "ftp://${{ secrets.FTP_HOST }}"
          echo "Removed db-init.php from server"

      - name: Run DB migration
        run: |
          curl -s --ftp-create-dirs \
            -T "./scripts/db-migrate.php" \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://${{ secrets.FTP_HOST }}/cs/alex-movie-theater/db-migrate.php"
          echo "Uploaded db-migrate.php — running..."
          curl -s --max-time 60 \
            "https://parityrfp.com/cs/alex-movie-theater/db-migrate.php" \
            -o /tmp/migrate-result.json
          echo "DB migration result:"
          cat /tmp/migrate-result.json
          curl -s \
            -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE /cs/alex-movie-theater/db-migrate.php" \
            "ftp://${{ secrets.FTP_HOST }}"
          echo "Removed db-migrate.php from server"

      - name: Deployment summary
        run: |
          echo "Deploy complete: https://parityrfp.com/cs/alex-movie-theater/"
